<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSIS HIERRO PRO v7</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-peru" class="cyber-bg"></div>
    <div class="overlay"></div>

    <div class="main-card">
        <header class="cyber-header">
            <div class="logo-area">
                <div class="neon-circle">⚕️</div>
                <div>
                    <h1>DOSIS<span>HIERRO</span></h1>
                    <p>SISTEMA 2026 - PERÚ</p>
                </div>
            </div>
            <div class="version-box">Puntos: <span id="numConsultas">0</span></div>
        </header>

        <section class="app-content">
            <div id="form-wrapper">
                <div class="input-grid">
                    <div class="field">
                        <label>PESO BEBÉ (KG)</label>
                        <input type="number" id="peso" placeholder="0.0" step="0.1" oninput="validar()">
                    </div>
                    <div class="field">
                        <label>MESES</label>
                        <input type="number" id="meses" value="1" min="1" oninput="validar()">
                    </div>
                </div>

                <div class="field">
                    <label>FINALIDAD DEL SUPLEMENTO</label>
                    <div class="cyber-options" id="options-esquema">
                        <button type="button" class="option-btn" data-value="2" onclick="seleccionarOpcion('esquema', this)">🛡️ PREVENCIÓN (2mg)</button>
                        <button type="button" class="option-btn" data-value="3" onclick="seleccionarOpcion('esquema', this)">💊 TRATAMIENTO (3mg)</button>
                    </div>
                    <input type="hidden" id="esquema" value="">
                </div>

                <div class="field">
                    <label>PRESENTACIÓN DE HIERRO</label>
                    <div class="cyber-options grid-options" id="options-tipoHierro">
                        <button type="button" class="option-btn" data-value="polimaltosado_g" onclick="seleccionarOpcion('tipoHierro', this)">Gotas Polimal.</button>
                        <button type="button" class="option-btn" data-value="sulfato_g" onclick="seleccionarOpcion('tipoHierro', this)">Gotas Sulfato</button>
                        <button type="button" class="option-btn" data-value="sulfato_j" onclick="seleccionarOpcion('tipoHierro', this)">Jarabe Sulfato</button>
                        <button type="button" class="option-btn" data-value="polimaltosado_j" onclick="seleccionarOpcion('tipoHierro', this)">Jarabe Polimal.</button>
                        <button type="button" class="option-btn full-width" data-value="micronutrientes" onclick="seleccionarOpcion('tipoHierro', this)">Micronutrientes (Sachet)</button>
                    </div>
                    <input type="hidden" id="tipoHierro" value="">
                </div>

                <div id="alerta-clinica" class="cyber-alert hidden">
                    <span class="blink">⚠</span>
                    <p id="msg-alerta"></p>
                </div>
            </div>

            <div id="result-card" class="result-view hidden">
                <div class="image-scanner">
                    <img id="imgHierro" src="" alt="Producto">
                    <div class="scan-line"></div>
                </div>
                <div class="data-screen">
                    <span class="data-label">DOSIS DIARIA RECOMENDADA</span>
                    <h2 id="resDosis">---</h2>
                    <p id="resFrascos">ENTREGAR: 0 Frascos.</p>
                </div>
                <button id="okBtn" class="btn-cyber btn-reg hidden" onclick="registrarYReiniciar()">OK - REGISTRAR PUNTOS</button>
            </div>
        </section>

        <footer class="app-footer" id="app-footer">
            <button id="actionBtn" class="btn-cyber btn-disabled" onclick="calcularDosis()" disabled>CALCULAR DOSIFICACIÓN</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

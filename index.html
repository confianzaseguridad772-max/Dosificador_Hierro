<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSIS HIERRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-peru"></div>
    <div class="overlay"></div>

    <div class="container">
        <div id="login-screen" class="glass-card">
            <header class="main-header">
                <div style="font-size: 40px; margin-bottom: 10px;">🏥</div>
                <h1>DOSIS<span>HIERRO</span></h1>
                <p>Versión Profesional</p>
            </header>
            <div style="margin-top: 25px; text-align: left;">
                <label style="font-size: 11px; font-weight: 800; color: #00a8ad;">USUARIO</label>
                <input type="number" id="user-input" placeholder="Ingrese su DNI">
            </div>
            <button class="btn-main" onclick="intentarLogin()">INICIAR SESIÓN</button>
            <button class="btn-text" onclick="mostrarRegistro()">¿No tienes cuenta? Regístrate</button>
            <a href="https://wa.me/51956113989" target="_blank" style="display: block; margin-top: 20px; color: #25D366; text-decoration: none; font-size: 12px; font-weight: 700;">📲 Soporte Técnico</a>
        </div>

        <div id="register-screen" class="glass-card hidden">
            <h2>NUEVO USUARIO</h2>
            <div class="grid-form">
                <input type="number" id="reg-dni" placeholder="Número de DNI">
                <input type="text" id="reg-nombre" placeholder="Nombre Completo">
                <input type="text" id="reg-profesion" placeholder="Cargo">
                <input type="number" id="reg-cel" placeholder="N° de Celular">
                <input type="text" id="reg-region" placeholder="Región">
                <input type="text" id="reg-provincia" placeholder="Provincia">
                <input type="text" id="reg-distrito" placeholder="Distrito">
                <input type="text" id="reg-eess" placeholder="EESS">
            </div>
            <button class="btn-main" id="btnReg" onclick="crearCuentaPropia()">REGISTRARME</button>
            <button class="btn-text" onclick="mostrarLogin()">Volver al Inicio</button>
        </div>

        <div id="app-container" class="glass-card hidden">
            <header class="app-header">
                <div style="text-align: left;">
                    <span style="font-weight: 900; color: #333;">🩺 <span id="prof-display">Cargando...</span></span><br>
                    <small id="eess-display" style="color: #888;"></small>
                </div>
                <div class="stats-badge">CONSULTAS: <b id="numConsultas">0</b></div>
            </header>

            <div class="alert-box" id="global-msg" style="background: #e0fbfc; padding: 10px; border-radius: 10px; font-size: 12px; margin-bottom: 15px;">Complete los datos.</div>

            <div style="text-align: left; margin-top: 15px;">
                <label style="font-size: 11px; font-weight: 800; color: #00a8ad;">⚖️ PESO DEL PACIENTE (KG)</label>
                <input type="number" id="peso" step="0.1" placeholder="Ej: 8.5" oninput="validarYCalcular()">
            </div>

            <div style="text-align: left; margin-top: 15px;">
                <label style="font-size: 11px; font-weight: 800; color: #00a8ad;">📋 FINALIDAD</label>
                <select id="esquema" onchange="validarYCalcular()">
                    <option value="">Seleccione...</option>
                    <option value="2">Preventivo (2mg/kg)</option>
                    <option value="3">Tratamiento (3mg/kg)</option>
                </select>
            </div>

            <div style="text-align: left; margin-top: 15px;">
                <label style="font-size: 11px; font-weight: 800; color: #00a8ad;">💊 PRODUCTO</label>
                <select id="tipoHierro" onchange="validarYCalcular()">
                    <option value="">Seleccione...</option>
                    <option value="polimaltosado_g">Gotas Polimaltosado</option>
                    <option value="sulfato_g">Gotas Sulfato Ferroso</option>
                    <option value="sulfato_j">Jarabe Sulfato Ferroso</option>
                    <option value="polimaltosado_j">Jarabe Polimaltosado</option>
                    <option value="micronutrientes">Micronutrientes</option>
                </select>
            </div>

            <div id="result-card" class="result-section hidden">
                <div class="res-main">
                    <small style="font-weight: 800; color: #00a8ad;">DOSIS DIARIA</small>
                    <h2 id="resDosis">---</h2>
                </div>
                <div style="background: #fff; border-radius: 15px; padding: 10px; margin-top: 10px;">
                    <div class="proy-item"><span> PARA 01 MES</span><b id="m1">-</b></div>
                    <div class="proy-item"><span>PARA 02 MESES</span><b id="m2">-</b></div>
                    <div class="proy-item"><span>PARA 03 MESES</span><b id="m3">-</b></div>
                </div>
                <button id="okBtn" class="btn-confirm" onclick="registrarYReiniciar()">NUEVA CONSULTA</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

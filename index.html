<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSIS HIERRO PRO v7 - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-peru" class="cyber-bg"></div>
    <div class="overlay"></div>

    <div id="login-screen" class="main-card">
        <header class="cyber-header">
            <div class="logo-area">
                <h1>ACCESO<span>RESTRINGIDO</span></h1>
                <p>SISTEMA DE DOSIFICACIÓN PROFESIONAL</p>
            </div>
        </header>
        <div class="app-content">
            <div class="field">
                <label>USUARIO</label>
                <input type="text" id="user-input" placeholder="Ingresa tu usuario">
            </div>
            <div class="field">
                <label>CONTRASEÑA</label>
                <input type="password" id="pass-input" placeholder="••••••••">
            </div>
            <button class="btn-cyber btn-calc" onclick="intentarLogin()">ENTRAR AL SISTEMA</button>
            <div class="pay-notice">
                <p>¿Solicitar acceso? (Costo: S/ 5.00)</p>
                <a href="https://wa.me/51956113989?text=Hola%20Gustavo,%20deseo%20acceso%20al%20sistema.%20Adjunto%20el%20pantallazo%20de%20Yape." target="_blank" class="btn-wa">📲 WhatsApp: 956113989</a>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="main-card hidden">
        <header class="cyber-header">
            <div class="logo-area"><h1>PANEL<span>ADMIN</span></h1></div>
            <button onclick="cerrarAdmin()" style="background:none; border:none; color:white; font-size:1.5rem;">✖</button>
        </header>
        <div class="app-content">
            <div class="field">
                <label>REGISTRAR NUEVO CLIENTE</label>
                <div class="input-grid">
                    <input type="text" id="new-u" placeholder="Usuario">
                    <input type="text" id="new-p" placeholder="Clave">
                </div>
                <input type="text" id="new-e" placeholder="Correo del cliente" style="margin-top:10px">
                <button class="btn-cyber btn-calc" style="margin-top:10px" onclick="crearNuevoUsuario()">+ ACTIVAR ACCESO</button>
            </div>
            <div id="lista-usuarios" class="user-list">
                </div>
        </div>
    </div>

    <div id="app-container" class="main-card hidden">
        <header class="cyber-header">
            <div class="logo-area">
                <div class="neon-circle">⚕️</div>
                <div>
                    <h1>DOSIS<span>HIERRO</span></h1>
                    <p>SISTEMA 2026 - PERÚ</p>
                </div>
            </div>
            <div class="version-box">Puntos: <span id="numConsultas">0</span></div>
            <button onclick="abrirAdmin()" style="opacity:0.1; background:none; border:none; color:white; cursor:default;">⚙</button>
        </header>

        <section class="app-content">
            <div id="form-wrapper">
                <div class="input-grid">
                    <div class="field">
                        <label>PESO BEBÉ (KG)</label>
                        <input type="number" id="peso" placeholder="0.0" step="0.1" min="0" max="100" oninput="validar()">
                    </div>
                    <div class="field">
                        <label>N° DE MESES </label>
                        <input type="number" id="meses" value="1" min="1" oninput="validar()">
                    </div>
                </div>

                <div class="field">
                    <label>FINALIDAD DEL HIERRO</label>
                    <div class="cyber-options" id="options-esquema">
                        <button type="button" class="option-btn" data-value="2" onclick="seleccionarOpcion('esquema', this)">🛡️ PREVENCIÓN (2mg)</button>
                        <button type="button" class="option-btn" data-value="3" onclick="seleccionarOpcion('esquema', this)">💊 TRATAMIENTO (3mg)</button>
                    </div>
                    <input type="hidden" id="esquema" value="">
                </div>

                <div class="field">
                    <label>PRESENTACIÓN</label>
                    <div class="cyber-options grid-options" id="options-tipoHierro">
                        <button type="button" class="option-btn" data-value="polimaltosado_g" onclick="seleccionarOpcion('tipoHierro', this)">Gotas Polimal.</button>
                        <button type="button" class="option-btn" data-value="sulfato_g" onclick="seleccionarOpcion('tipoHierro', this)">Gotas Sulfato</button>
                        <button type="button" class="option-btn" data-value="sulfato_j" onclick="seleccionarOpcion('tipoHierro', this)">Jarabe Sulfato</button>
                        <button type="button" class="option-btn" data-value="polimaltosado_j" onclick="seleccionarOpcion('tipoHierro', this)">Jarabe Polimal.</button>
                        <button type="button" class="option-btn full-width" data-value="micronutrientes" onclick="seleccionarOpcion('tipoHierro', this)">Micronutrientes (Sachet)</button>
                    </div>
                    <input type="hidden" id="tipoHierro" value="">
                </div>

                <div id="alerta-clinica" class="cyber-alert hidden">
                    <span class="blink">⚠</span>
                    <p id="msg-alerta"></p>
                </div>
            </div>

            <div id="result-card" class="result-view hidden">
                <div class="image-scanner">
                    <img id="imgHierro" src="" alt="Producto">
                    <div class="scan-line"></div>
                </div>
                <div class="data-screen">
                    <span class="data-label">DOSIS DIARIA</span>
                    <h2 id="resDosis">---</h2>
                    <p id="resFrascos">ENTREGAR: 0 Unidades.</p>
                </div>
                <button id="okBtn" class="btn-cyber btn-reg hidden" onclick="registrarYReiniciar()">OK</button>
            </div>
        </section>

        <footer class="app-footer" id="app-footer">
            <button id="actionBtn" class="btn-cyber btn-disabled" onclick="calcularDosis()" disabled>CALCULAR DOSIS</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA HIERRO V7 - PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-peru"></div>
    <div class="overlay"></div>

    <div class="container">
        <div id="login-screen" class="glass-card">
            <header class="main-header">
                <h1>SISTEMA<span>HIERRO</span></h1>
                <p>Gestión Clínica Profesional 2026</p>
            </header>
            <div class="input-group">
                <label>DNI DEL PROFESIONAL</label>
                <input type="number" id="user-input" placeholder="Ingrese DNI">
            </div>
            <button class="btn-main" onclick="intentarLogin()">ENTRAR AL SISTEMA</button>
            <button class="btn-text" onclick="mostrarRegistro()">¿No tienes cuenta? Regístrate</button>
            <a href="https://wa.me/51956113989" target="_blank" class="ws-link">📲 Contactar al Creador (Dudas)</a>
        </div>

        <div id="register-screen" class="glass-card hidden">
            <header class="main-header"><h2>NUEVO REGISTRO</h2></header>
            <div class="grid-form">
                <input type="number" id="reg-dni" placeholder="DNI">
                <input type="text" id="reg-nombre" placeholder="Nombre y Apellidos">
                <input type="text" id="reg-profesion" placeholder="Profesión">
                <input type="number" id="reg-cel" placeholder="Celular">
                <input type="text" id="reg-eess" placeholder="Establecimiento (EESS)">
            </div>
            <button class="btn-main" onclick="crearCuentaPropia()">FINALIZAR REGISTRO</button>
            <button class="btn-text" onclick="mostrarLogin()">Volver al Inicio</button>
        </div>

        <div id="app-container" class="glass-card hidden">
            <header class="app-header">
                <div class="user-info">
                    <span id="prof-display">Bienvenido</span>
                    <small id="eess-display">EESS</small>
                </div>
                <div class="stats-badge">CONSULTAS: <b id="numConsultas">0</b></div>
            </header>

            <div class="calc-body">
                <div class="alert-box" id="global-msg">Complete los datos para calcular.</div>

                <div class="field">
                    <label>PESO DEL PACIENTE (KG)</label>
                    <input type="number" id="peso" step="0.1" placeholder="0.0" oninput="validarYCalcular()">
                </div>

                <div class="field">
                    <label>FINALIDAD (NTS 213-2024)</label>
                    <select id="esquema" onchange="validarYCalcular()">
                        <option value="">Seleccione...</option>
                        <option value="2">Preventivo (2mg/kg)</option>
                        <option value="3">Tratamiento (3mg/kg)</option>
                    </select>
                </div>

                <div class="field">
                    <label>PRESENTACIÓN DEL PRODUCTO</label>
                    <select id="tipoHierro" onchange="validarYCalcular()">
                        <option value="">Seleccione Producto...</option>
                        <option value="polimaltosado_g">Gotas Polimaltosado (50mg/ml)</option>
                        <option value="sulfato_g">Gotas Sulfato Ferroso (25mg/ml)</option>
                        <option value="sulfato_j">Jarabe Sulfato Ferroso (15mg/5ml)</option>
                        <option value="polimaltosado_j">Jarabe Polimaltosado (50mg/5ml)</option>
                        <option value="micronutrientes">Micronutrientes (Sachet)</option>
                    </select>
                </div>

                <div id="result-card" class="result-section hidden">
                    <div class="res-main">
                        <small>DOSIS DIARIA RECOMENDADA</small>
                        <h2 id="resDosis">---</h2>
                    </div>
                    
                    <div class="res-proyeccion">
                        <div class="proy-item"><span>1 MES</span><b id="m1">-</b></div>
                        <div class="proy-item"><span>2 MESES</span><b id="m2">-</b></div>
                        <div class="proy-item"><span>3 MESES</span><b id="m3">-</b></div>
                    </div>

                    <button id="okBtn" class="btn-confirm" onclick="registrarYReiniciar()">CONFIRMAR Y GUARDAR (OK)</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

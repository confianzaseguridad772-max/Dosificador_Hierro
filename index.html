<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOSIS HIERRO PRO v7 - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-peru" class="cyber-bg"></div>
    <div class="overlay"></div>

    <div id="login-screen" class="main-card">
        <header class="cyber-header">
            <div class="logo-area">
                <h1>DOSIFICADOR<span>-HIERRO</span></h1>
                <p>Mg. Gustabo Ortiz</p>
            </div>
        </header>
        <div class="app-content">
            <div class="avatar-box">
                <div class="nurse-avatar">
                    <img src="https://cdn-icons-png.flaticon.com/512/3844/3844391.png" alt="Enfermera">
                    <div class="peru-flag-mini"></div>
                </div>
                <p class="avatar-text">¡Hola! Ingresa tu DNI para comenzar.</p>
            </div>
            <div class="field">
                <label>DNI DEL PROFESIONAL</label>
                <input type="number" id="user-input" placeholder="Ej: 45678912">
            </div>
            <button class="btn-cyber btn-calc" onclick="intentarLogin()">ENTRAR AL SISTEMA</button>
            <div class="pay-notice">
                <button class="btn-reg" onclick="mostrarRegistro()">¿No estás registrado?</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="main-card hidden">
        <header class="cyber-header">
            <div class="logo-area">
                <h1>DOSIS<span>DIARIA</span></h1>
                <p id="profesional-name">Cargando...</p>
            </div>
            <div class="version-box">P: <span id="numConsultas">0</span></div>
        </header>

        <section class="app-content">
            <div id="form-wrapper">
                <div class="input-grid">
                    <div class="field">
                        <label>PESO (KG)</label>
                        <input type="number" id="peso" placeholder="0.0" oninput="autoCalcular()">
                    </div>
                    <div class="field">
                        <label>MESES</label>
                        <input type="number" id="meses" value="1" oninput="autoCalcular()">
                    </div>
                </div>

                <div class="field">
                    <label>FINALIDAD (NTS 213-2024)</label>
                    <div class="cyber-options">
                        <button class="option-btn" data-value="2" onclick="seleccionarOpcion('esquema', this)">🛡️ PREVENTIVO</button>
                        <button class="option-btn" data-value="3" onclick="seleccionarOpcion('esquema', this)">💊 TRATAMIENTO</button>
                    </div>
                    <input type="hidden" id="esquema">
                </div>

                <div class="field">
                    <label>PRESENTACIÓN</label>
                    <div class="cyber-options grid-options">
                        <button class="option-btn" data-value="polimaltosado_g" onclick="seleccionarOpcion('tipoHierro', this)">Gts Polimaltosa</button>
                        <button class="option-btn" data-value="sulfato_g" onclick="seleccionarOpcion('tipoHierro', this)">Gts Sulfato</button>
                        <button class="option-btn" data-value="sulfato_j" onclick="seleccionarOpcion('tipoHierro', this)">Jrb Sulfato</button>
                        <button class="option-btn" data-value="polimaltosado_j" onclick="seleccionarOpcion('tipoHierro', this)">Jrb Polimaltosa</button>
                        <button class="option-btn full-width" data-value="micronutrientes" onclick="seleccionarOpcion('tipoHierro', this)">Sachet (MN)</button>
                    </div>
                    <input type="hidden" id="tipoHierro">
                </div>
            </div>

            <div id="result-card" class="result-view hidden">
                <div class="data-screen">
                    <span class="data-label">DOSIS SUGERIDA</span>
                    <h2 id="resDosis">---</h2>
                    <p id="resFrascos">Calculando...</p>
                </div>
                <button id="okBtn" class="btn-cyber btn-calc" onclick="registrarYReiniciar()">CONFIRMAR (OK)</button>
            </div>
        </section>
    </div>

    <div id="register-screen" class="main-card hidden">
        </div>

    <script src="script.js"></script>
</body>
</html>

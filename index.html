<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Base Hierro 2026 - V7</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-peru"></div>
    <div class="overlay"></div>

    <div class="nurse-container">
        <div class="nurse-avatar-live">
            <img src="https://cdn-icons-png.flaticon.com/512/3844/3844391.png" alt="Enfermera" id="nurse-img">
            <div class="flag-badge"></div>
        </div>
        <div class="nurse-bubble" id="nurse-msg">¡Hola! Ingresa tu DNI para comenzar.</div>
    </div>

    <div id="login-screen" class="glass-card">
        <div class="header-minimal">
            <h1>SISTEMA<span>HIERRO</span></h1>
            <p>Versión Profesional 2026</p>
        </div>
        <div class="input-group">
            <label>DNI PROFESIONAL</label>
            <input type="number" id="user-input" placeholder="Ingrese DNI">
        </div>
        <button class="btn-main" onclick="intentarLogin()">INICIAR SESIÓN</button>
        <button class="btn-text" onclick="mostrarRegistro()">Crear cuenta nueva</button>
        <div class="admin-access" onclick="abrirAdmin()">⚙️</div>
    </div>

    <div id="register-screen" class="glass-card hidden">
        <h2>Registro de Profesional</h2>
        <div class="grid-form">
            <input type="number" id="reg-dni" placeholder="DNI">
            <input type="text" id="reg-nombre" placeholder="Nombre Completo">
            <input type="text" id="reg-profesion" placeholder="Profesión">
            <input type="number" id="reg-cel" placeholder="Celular">
            <input type="text" id="reg-eess" placeholder="EESS">
        </div>
        <button class="btn-main" onclick="crearCuentaPropia()">FINALIZAR REGISTRO</button>
        <button class="btn-text" onclick="mostrarLogin()">Volver al Login</button>
    </div>

    <div id="app-container" class="glass-card hidden">
        <div class="user-info-bar">
            <span id="prof-display">Bienvenido</span>
            <span class="badge">Consultas: <span id="numConsultas">0</span></span>
        </div>

        <div class="calculator-body">
            <div class="field">
                <label>Peso del Paciente (Kg)</label>
                <input type="number" id="peso" step="0.1" oninput="validarYCalcular()">
            </div>

            <div class="field">
                <label>Esquema (NTS 213-2024)</label>
                <select id="esquema" onchange="validarYCalcular()">
                    <option value="">Seleccione...</option>
                    <option value="2">Preventivo (2mg)</option>
                    <option value="3">Tratamiento (3mg)</option>
                </select>
            </div>

            <div class="field">
                <label>Presentación</label>
                <select id="tipoHierro" onchange="actualizarImagenYCalcular()">
                    <option value="">Seleccione Producto...</option>
                    <option value="polimaltosado_g">Gotas Polimaltosado</option>
                    <option value="sulfato_g">Gotas Sulfato Ferroso</option>
                    <option value="sulfato_j">Jarabe Sulfato Ferroso</option>
                    <option value="polimaltosado_j">Jarabe Polimaltosado</option>
                    <option value="micronutrientes">Micronutrientes (Sachet)</option>
                </select>
            </div>
            
            <input type="hidden" id="meses" value="1"> <div id="result-card" class="result-area hidden">
                <div class="res-box">
                    <small>DOSIS DIARIA</small>
                    <h2 id="resDosis">---</h2>
                </div>
                <div class="res-box">
                    <small>CANTIDAD A ENTREGAR</small>
                    <h3 id="resFrascos">---</h3>
                </div>
                <button class="btn-confirm" id="okBtn" onclick="registrarYReiniciar()">CONFIRMAR (OK)</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="glass-card hidden">
        <button onclick="cerrarAdmin()">✖ Cerrar</button>
        <div id="lista-usuarios"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

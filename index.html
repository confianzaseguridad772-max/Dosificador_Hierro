<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Hierro v7 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-peru"></div>
    <div class="overlay"></div>

    <div class="main-wrapper">
        <div class="nurse-section">
            <div class="nurse-circle">
                <img src="https://cdn-icons-png.flaticon.com/512/3844/3844391.png" alt="Nurse">
                <div class="peru-flag"></div>
            </div>
            <div class="bubble" id="nurse-msg">¡Hola! Ingresa tu DNI para iniciar.</div>
        </div>

        <div class="glass-card">
            <div id="login-screen">
                <h1 class="title">SISTEMA<span>HIERRO</span></h1>
                <div class="input-box">
                    <label>DNI PROFESIONAL</label>
                    <input type="number" id="user-input" placeholder="Escribe tu DNI aquí">
                </div>
                <button class="btn-primary" onclick="intentarLogin()">ENTRAR</button>
                <button class="btn-link" onclick="mostrarRegistro()">¿No tienes cuenta? Regístrate</button>
            </div>

            <div id="app-container" class="hidden">
                <div class="top-bar">
                    <span id="prof-display">Bienvenido</span>
                    <span class="count">Puntos: <b id="numConsultas">0</b></span>
                </div>

                <div class="form-grid">
                    <div class="input-box">
                        <label>PESO (KG)</label>
                        <input type="number" id="peso" step="0.1" placeholder="0.0" oninput="validarYCalcular()">
                    </div>
                    
                    <div class="input-box">
                        <label>FINALIDAD</label>
                        <select id="esquema" onchange="validarYCalcular()">
                            <option value="">Seleccione...</option>
                            <option value="2">Preventivo (2mg)</option>
                            <option value="3">Tratamiento (3mg)</option>
                        </select>
                    </div>

                    <div class="input-box full">
                        <label>PRESENTACIÓN</label>
                        <select id="tipoHierro" onchange="validarYCalcular()">
                            <option value="">Seleccione Producto...</option>
                            <option value="polimaltosado_g">Gotas Polimaltosado</option>
                            <option value="sulfato_g">Gotas Sulfato Ferroso</option>
                            <option value="sulfato_j">Jarabe Sulfato Ferroso</option>
                            <option value="polimaltosado_j">Jarabe Polimaltosado</option>
                            <option value="micronutrientes">Sachet (MN)</option>
                        </select>
                    </div>
                </div>

                <div id="result-card" class="result-box hidden">
                    <div class="res-item">
                        <small>DOSIS DIARIA</small>
                        <h2 id="resDosis">---</h2>
                    </div>
                    <div class="res-item">
                        <small>TOTAL A ENTREGAR</small>
                        <h3 id="resFrascos">---</h3>
                    </div>
                    <button class="btn-confirm" id="okBtn" onclick="registrarYReiniciar()">CONFIRMAR ENVÍO (OK)</button>
                </div>
            </div>

            <div id="register-screen" class="hidden">
                <h2>Nuevo Registro</h2>
                <input type="number" id="reg-dni" placeholder="DNI">
                <input type="text" id="reg-nombre" placeholder="Nombre completo">
                <input type="text" id="reg-eess" placeholder="EESS">
                <button class="btn-primary" onclick="crearCuentaPropia()">REGISTRARME</button>
                <button class="btn-link" onclick="mostrarLogin()">Volver</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
